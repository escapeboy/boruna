name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Build with http feature
        run: cargo build --workspace --features boruna-vm/http

      - name: Run tests with http feature
        run: cargo test -p boruna-vm --features http

      - name: Build with serve feature
        run: cargo build -p boruna-cli --features serve

      - name: Run tests with serve feature
        run: cargo test -p boruna-cli --features serve

      - name: Validate example workflows
        run: |
          for dir in examples/workflows/*/; do
            cargo run --bin boruna -- workflow validate "$dir"
          done

      - name: Smoke-test example workflows end-to-end
        # Sprint W9-D: catches integration regressions where DAG validation
        # passes but execution fails (compile errors in .ax sources,
        # capability gating bugs, bundle-write failures). For each example,
        # we RUN the workflow with --policy allow-all --record, then
        # `evidence verify` the produced bundle.
        #
        # Why allow-all: examples ship with stub capability handlers in demo
        # mode, so allow-all is safe and exercises the gating code path.
        # We do NOT pass --live; no real network, db, or LLM calls.
        run: |
          set -euo pipefail
          SMOKE_DIR=$(mktemp -d)
          trap 'rm -rf "$SMOKE_DIR"' EXIT
          for dir in examples/workflows/*/; do
            example=$(basename "$dir")
            echo "=== smoke: $example ==="
            DATA_DIR="$SMOKE_DIR/$example"
            EV_DIR="$DATA_DIR/evidence"
            mkdir -p "$DATA_DIR"
            cargo run --bin boruna -- workflow run "$dir" \
              --policy allow-all \
              --record \
              --data-dir "$DATA_DIR" \
              --evidence-dir "$EV_DIR"
            # Bundles land at $EV_DIR/<run-id>/.
            run_id=$(ls "$EV_DIR" | head -1)
            if [ -z "$run_id" ]; then
              echo "ERROR: no run produced for $example" >&2
              exit 1
            fi
            cargo run --bin boruna -- evidence verify "$EV_DIR/$run_id"
          done

      - name: Compile benches (no-run)
        # Sprint W8: regression-gate the criterion bench harness so a
        # bench refactor that breaks compilation surfaces at PR time.
        # We do NOT execute benches in CI — bench TIMING data is the
        # operator's job to capture on a representative production-class
        # machine; see docs/PERFORMANCE.md for the workflow. Compile-only
        # adds <30s on a warm cache.
        run: cargo bench -p boruna-benches --no-run

  clippy:
    name: Clippy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Clippy with http feature
        run: cargo clippy --workspace --features boruna-vm/http --all-targets -- -D warnings

      - name: Run Clippy with serve feature
        run: cargo clippy -p boruna-cli --features serve --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check
