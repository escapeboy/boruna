name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.0). Used only for workflow_dispatch.'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux musl targets run on the project's self-hosted runner
          # (boruna-runner, Linux X64). Same machine as ci.yml — warm cargo
          # cache makes these builds <1 min after the first one.
          - target: x86_64-unknown-linux-musl
            os: self-hosted
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: self-hosted
            use_cross: true
          # macOS arm64 runs on a GitHub-hosted runner. Apple Silicon is the
          # only Mac target shipped — Intel macOS users build from source.
          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          # Validate tag matches expected vX.Y.Z[-suffix] shape — guards against
          # a workflow_dispatch caller injecting shell metacharacters via INPUT_TAG.
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "::error::Invalid tag '$tag' — expected vX.Y.Z or vX.Y.Z-suffix"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux musl targets)
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binaries (cross)
        if: matrix.use_cross == true
        env:
          TARGET: ${{ matrix.target }}
        run: |
          cross build --release --target "$TARGET" --bin boruna
          cross build --release --target "$TARGET" --bin boruna-mcp
          cross build --release --target "$TARGET" --bin boruna-pkg
          cross build --release --target "$TARGET" --bin boruna-orch

      - name: Build binaries (cargo)
        if: matrix.use_cross == false
        env:
          TARGET: ${{ matrix.target }}
        run: |
          cargo build --release --target "$TARGET" --bin boruna
          cargo build --release --target "$TARGET" --bin boruna-mcp
          cargo build --release --target "$TARGET" --bin boruna-pkg
          cargo build --release --target "$TARGET" --bin boruna-orch

      - name: Stage release artifact
        id: stage
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          version="${TAG#v}"
          dir="boruna-${version}-${TARGET}"
          mkdir "$dir"
          for bin in boruna boruna-mcp boruna-pkg boruna-orch; do
            cp "target/${TARGET}/release/$bin" "$dir/"
          done
          cp LICENSE README.md CHANGELOG.md "$dir/"
          tar -czf "${dir}.tar.gz" "$dir"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${dir}.tar.gz" > "${dir}.tar.gz.sha256"
          else
            shasum -a 256 "${dir}.tar.gz" > "${dir}.tar.gz.sha256"
          fi
          echo "asset=${dir}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${dir}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.stage.outputs.asset }}
            ${{ steps.stage.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "::error::Invalid tag '$tag' — expected vX.Y.Z or vX.Y.Z-suffix"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout repository (for CHANGELOG)
        uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Strip leading 'v' from tag (e.g. v1.0.0-rc2 -> 1.0.0-rc2).
          version="${TAG#v}"
          # awk extracts content between '## [VERSION]' and the next '## [' header.
          awk -v ver="$version" '
            /^## \[/ {
              if (in_section) exit
              if ($0 ~ "^## \\[" ver "\\]") { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG section found for [$version] - update CHANGELOG.md before tagging." >&2
            exit 1
          fi
          echo "notes_file=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact tree
        shell: bash
        run: |
          mkdir -p flat
          find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} flat/ \;
          ls -la flat
          ( cd flat && cat *.sha256 > SHA256SUMS && rm *.sha256 )
          ls -la flat

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: |
            flat/*.tar.gz
            flat/SHA256SUMS
          fail_on_unmatched_files: true
