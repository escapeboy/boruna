version: "3.8"

# Local blob storage services for integration tests.
# Usage: docker compose -f docker-compose.blob-tests.yml up -d
#        cargo test -p boruna-orchestrator --features blob-integration -- --ignored blob_
#        docker compose -f docker-compose.blob-tests.yml down

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    command: -scheme http -port 4443
    ports:
      - "4443:4443"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4443/"]
      interval: 5s
      timeout: 3s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    # --loose disables request-signature validation so tests can create
    # containers without implementing full SharedKey signing.
    command: azurite-blob --blobHost 0.0.0.0 --loose
    ports:
      - "10000:10000"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 5s
      timeout: 3s
      retries: 5
